[build]
  command = "npm run build"
  publish = "dist/inkwell/browser"

[[redirects]]
  from = "/auth/*"
  to = "http://15.206.128.235:8080/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "http://15.206.128.235:8080/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/comments/*"
  to = "http://15.206.128.235:8080/comments/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/posts/*"
  to = "http://15.206.128.235:8080/posts/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/categories/*"
  to = "http://15.206.128.235:8080/categories/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/newsletter/*"
  to = "http://15.206.128.235:8080/newsletter/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/oauth2/*"
  to = "http://15.206.128.235:8080/oauth2/:splat"
  status = 200
  force = true

# SPA Routing Fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"

[functions]
  node_bundler = "esbuild"
